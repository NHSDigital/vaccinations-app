version: 2

updates:
  # Dependabot raises grouped PRs every Wednesday.
  # Non-security patch/minor updates are merged on sprint Wednesdays (biweekly)
  # and squash-merged into a single commit before promoting to the release branch.
  # Security updates (critical/high) are handled immediately outside this cadence.

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      all-actions:
        patterns: ["*"]
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
    groups:
      all-non-major:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "next"
        versions: [">=16.0.0"]
      - dependency-name: "eslint-config-next"
        versions: [">=16.0.0"]
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
    cooldown:
      default-days: 7

  - package-ecosystem: "terraform"
    directories: ["/infrastructure/modules/**"]
    groups:
      infrastructure-updates:
        patterns: ["*"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]
    schedule:
      interval: "weekly"
